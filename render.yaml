services:
  - type: web
    name: blogproject
    env: python
    pythonVersion: 3.12.7
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn blogproject.wsgi:application --access-logfile - --error-logfile - --log-level info --capture-output