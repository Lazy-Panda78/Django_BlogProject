{% extends 'base.html' %}
{% block body %}
<section class="content">
    <div class="section-header">
        <div>
            <span class="eyebrow">Publishing space</span>
            <h2 class="section-title">Create post</h2>
            <p class="section-subtitle">Write something clear, add an image if you have one, and publish in a few steps.</p>
        </div>
    </div>

    <div class="form-card">
        <div class="form-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="button" type="submit">Publish post</button>
            </form>
        </div>
    </div>
</section>
{% endblock body %}
